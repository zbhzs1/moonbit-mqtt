name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install MoonBit
      run: |
        curl -fsSL https://moonbitlang.com/install.sh | sh
    
    - name: Check
      run: $HOME/.moon/bin/moon check
    
    - name: Build
      run: $HOME/.moon/bin/moon build
    
    - name: Test
      run: $HOME/.moon/bin/moon test
