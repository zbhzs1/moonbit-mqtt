name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install MoonBit
      run: |
        curl -fsSL https://moonbitlang.com/install.sh | sh
        echo "$HOME/.moon/bin" >> $GITHUB_PATH
    
    - name: Check
      run: moon check
    
    - name: Build
      run: moon build
    
    - name: Test
      run: moon test
