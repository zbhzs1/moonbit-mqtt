name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup MoonBit
      uses: moonbitlang/setup-moonbit@v1
      with:
        version: latest
    
    - name: Check
      run: moon check
    
    - name: Build
      run: moon build
    
    - name: Test
      run: moon test
    
    - name: Check formatting
      run: moon fmt --check
